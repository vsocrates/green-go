<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Green Go · Energy Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Geist', system-ui, sans-serif; height: 100%; }
  #root { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 16px; }
  .phone-shell {
    width: 375px;
    height: 812px;
    border-radius: 54px;
    background: #1a1a1a;
    padding: 14px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08) inset,
      0 2px 4px rgba(0,0,0,0.5),
      0 20px 60px rgba(0,0,0,0.35),
      0 40px 100px rgba(0,0,0,0.2);
    position: relative;
    flex: none;
  }
  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 44px;
    overflow: hidden;
    background: #FAF8F3;
    position: relative;
  }
  .phone-notch {
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 126px; height: 37px;
    background: #1a1a1a;
    border-radius: 0 0 24px 24px;
    z-index: 100;
  }
  * { scrollbar-width: none; }
  *::-webkit-scrollbar { display: none; }

  @keyframes screenFade {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .screen-enter { animation: screenFade 0.18s ease-out; }

  @media (max-width: 700px) {
    .phone-shell { width: 340px; height: 720px; border-radius: 44px; }
    .phone-screen { border-radius: 34px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script type="text/babel">

// ─── Design tokens ──────────────────────────────────────────────────────────
const G = {
  appBg:       '#FAF8F3',
  surface:     '#FFFFFF',
  surfaceSoft: '#F4F1E9',
  surfaceWarm: '#EFEBE0',
  surfaceDark: '#19170F',
  ink1:  '#1B1813',
  ink2:  '#4E4A41',
  ink3:  '#8A857A',
  ink4:  '#B5B0A4',
  divider:    '#EAE6DB',
  dividerSoft:'#F0EDE3',
  brandDeep:  '#0F4D2A',
  brandAction:'#1E8F4A',
  brandTint:  '#E4EFE2',
  brandGlow:  '#F0F7EE',
  amberDeep:  '#8C4B1F',
  amberAction:'#C56B2D',
  amberTint:  '#F5E4CE',
  amberGlow:  '#FBF2E2',
  strokeSoft: 'rgba(27,24,19,0.06)',
  strokeMed:  'rgba(27,24,19,0.10)',
  shadow:     '0 1px 2px rgba(27,24,19,0.04), 0 4px 12px rgba(27,24,19,0.04)',
  shadowHi:   '0 1px 2px rgba(27,24,19,0.05), 0 12px 32px rgba(27,24,19,0.08)',
  sans:  "'Geist', -apple-system, system-ui, sans-serif",
  serif: "'Instrument Serif', Georgia, serif",
  mono:  "'Geist Mono', ui-monospace, monospace",

// ─── Primitives ──────────────────────────────────────────────────────────────
function Box({ children, style, tone = 'paper', padded = true, raised = true }) {
  const map = {
    paper: { bg: G.surface,     st: G.strokeSoft },
    soft:  { bg: G.surfaceSoft, st: G.strokeSoft },
    green: { bg: G.brandGlow,   st: 'rgba(15,77,42,0.12)' },
    amber: { bg: G.amberGlow,   st: 'rgba(140,75,31,0.15)' },
    dark:  { bg: G.surfaceDark, st: 'rgba(0,0,0,0.4)' },
  }[tone] || { bg: G.surface, st: G.strokeSoft };
  return (
    <div style={{
      background: map.bg,
      border: `1px solid ${map.st}`,
      borderRadius: 16,
      padding: padded ? 16 : 0,
      boxShadow: raised ? G.shadow : 'none',
      ...style,
    }}>{children}</div>
  );
}

function Label({ children, style, tone = 'mute' }) {
  const c = tone === 'mute' ? G.ink3 : tone === 'brand' ? G.brandDeep : tone === 'amber' ? G.amberDeep : G.ink2;
  return (
    <div style={{ fontFamily: G.sans, fontWeight: 600, fontSize: 10.5, letterSpacing: '0.09em', textTransform: 'uppercase', color: c, lineHeight: 1, ...style }}>{children}</div>
  );
}

function Mono({ children, style }) {
  return <span style={{ fontFamily: G.mono, fontSize: 12, color: G.ink2, letterSpacing: '-0.01em', ...style }}>{children}</span>;
}

function Dot({ color = 'green', pulse = false, size = 8 }) {
  const c = color === 'green' ? G.brandAction : color === 'amber' ? G.amberAction : color === 'ink' ? G.ink3 : color;
  return (
    <span style={{
      display: 'inline-block', width: size, height: size, borderRadius: '50%',
      background: c, flex: 'none',
      boxShadow: pulse ? `0 0 0 4px ${color === 'green' ? 'rgba(30,143,74,0.18)' : 'rgba(197,107,45,0.18)'}` : 'none',
    }} />
  );
}

function Pill({ children, tone = 'ink', style }) {
  const map = {
    ink:   { bg: G.surfaceSoft, fg: G.ink2 },
    green: { bg: G.brandTint,   fg: G.brandDeep },
    amber: { bg: G.amberTint,   fg: G.amberDeep },
    solid: { bg: G.ink1,        fg: '#fff' },
    brand: { bg: G.brandDeep,   fg: '#fff' },
  }[tone];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: '5px 10px', borderRadius: 999,
      background: map.bg, color: map.fg,
      fontFamily: G.sans, fontWeight: 600, fontSize: 11,
      letterSpacing: '0.02em', ...style,
    }}>{children}</span>
  );
}

function Display({ children, size = 56, style }) {
  return (
    <div style={{ fontFamily: G.sans, fontWeight: 600, fontSize: size, letterSpacing: '-0.045em', lineHeight: 0.98, color: G.ink1, ...style }}>{children}</div>
  );
}

function InfoDot({ size = 14 }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      width: size, height: size, borderRadius: '50%',
      border: `1px solid ${G.ink3}`, color: G.ink3, flex: 'none',
      fontFamily: G.sans, fontSize: size * 0.62, fontWeight: 600, lineHeight: 1,
    }}>i</span>
  );
}

// ─── Icons ───────────────────────────────────────────────────────────────────
function GIcon({ kind, size = 22, color = G.ink1 }) {
  const h = size, w = size, s = size;
  const sk = { stroke: color, strokeWidth: 1.5, fill: 'none', strokeLinecap: 'round', strokeLinejoin: 'round' };
  if (kind === 'sun') return (
    <svg width={w} height={h} viewBox={`0 0 ${s} ${s}`}>
      <circle cx={s/2} cy={s/2} r={s*0.20} fill={color} />
      {[0,1,2,3,4,5,6,7].map(i => {
        const a = (i/8)*Math.PI*2, r1=s*0.30, r2=s*0.44;
        return <line key={i} x1={s/2+Math.cos(a)*r1} y1={s/2+Math.sin(a)*r1} x2={s/2+Math.cos(a)*r2} y2={s/2+Math.sin(a)*r2} stroke={color} strokeWidth="1.6" strokeLinecap="round" />;
      })}
    </svg>
  );
  if (kind === 'batt') return (
    <svg width={w} height={h} viewBox={`0 0 ${s} ${s}`}>
      <rect x={s*0.12} y={s*0.30} width={s*0.66} height={s*0.40} rx={3} {...sk} />
      <rect x={s*0.80} y={s*0.40} width={s*0.08} height={s*0.20} rx={1} fill={color} stroke="none" />
      <rect x={s*0.18} y={s*0.36} width={s*0.50} height={s*0.28} rx={1.5} fill={color} stroke="none" />
    </svg>
  );
  if (kind === 'temp') return (
    <svg width={w} height={h} viewBox={`0 0 ${s} ${s}`}>
      <path d={`M ${s/2-1.4} ${s*0.15} a 2 2 0 0 1 2.8 0 L ${s/2+1.4} ${s*0.65}`} {...sk} />
      <path d={`M ${s/2-1.4} ${s*0.15} L ${s/2-1.4} ${s*0.65}`} {...sk} />
      <circle cx={s/2} cy={s*0.78} r={s*0.13} fill={color} stroke={color} strokeWidth="1.4" />
      <line x1={s/2} y1={s*0.78} x2={s/2} y2={s*0.40} stroke={color} strokeWidth="1.6" strokeLinecap="round" />
    </svg>
  );
  if (kind === 'ev') return (
    <svg width={w} height={h} viewBox={`0 0 ${s} ${s}`}>
      <rect x={s*0.10} y={s*0.42} width={s*0.55} height={s*0.26} rx={3} {...sk} />
      <path d={`M ${s*0.16} ${s*0.42} L ${s*0.24} ${s*0.28} L ${s*0.52} ${s*0.28} L ${s*0.60} ${s*0.42}`} {...sk} />
      <circle cx={s*0.24} cy={s*0.70} r={s*0.07} fill={color} />
      <circle cx={s*0.52} cy={s*0.70} r={s*0.07} fill={color} />
      <path d={`M ${s*0.70} ${s*0.50} L ${s*0.80} ${s*0.50} L ${s*0.74} ${s*0.42} M ${s*0.80} ${s*0.50} L ${s*0.74} ${s*0.58}`} {...sk} />
    </svg>
  );
  return null;
}

  const s = SCENARIOS[scenario];
  const isAmber = s.rateTone === 'amber';
  return (
    <div style={{ padding: '10px 14px', borderRadius: 12, background: isAmber ? G.amberGlow : G.surfaceSoft, border: `1px solid ${isAmber ? 'rgba(140,75,31,0.14)' : G.strokeSoft}`, display: 'flex', alignItems: 'center', gap: 10 }}>

          <circle cx="6" cy="6" r="4.5" fill="none" stroke={isAmber ? G.amberDeep : G.ink2} strokeWidth="1.3" />

      </div>
      <div style={{ fontFamily: G.sans, fontSize: 13, fontWeight: 500, color: isAmber ? G.amberDeep : G.ink2, flex: 1, lineHeight: 1.35 }}>{s.rateText}</div>

  );

  const filters = ['All', 'Solar', 'Battery', 'Thermostat', 'EV'];
  const deviceKey = { Solar: 'solar', Battery: 'battery', Thermostat: 'thermostat', EV: 'ev' };

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: G.appBg, fontFamily: G.sans, color: G.ink1 }}>
      <StatusBar />
      <div style={{ padding: '4px 20px 8px' }}>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
          <div style={{ fontFamily: G.serif, fontSize: 30, fontWeight: 400, color: G.ink1, letterSpacing: '-0.015em' }}>History</div>
          <div style={{ textAlign: 'right' }}>
            <Label>LAST 30 DAYS</Label>
            <div style={{ fontFamily: G.sans, fontSize: 16, fontWeight: 600, color: G.brandAction, marginTop: 3, letterSpacing: '-0.02em' }}>$84.20 saved</div>
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 5, marginTop: 12 }}>
          {filters.map(f => (
            <div key={f} onClick={() => setFilter(f)} style={{ padding: '7px 4px', borderRadius: 999, background: f === filter ? G.ink1 : G.surface, color: f === filter ? '#fff' : G.ink2, border: f === filter ? 'none' : `1px solid ${G.divider}`, fontFamily: G.sans, fontSize: 12, fontWeight: 600, cursor: 'pointer', textAlign: 'center', whiteSpace: 'nowrap' }}>{f}</div>
          ))}
        </div>
      </div>
      <div style={{ flex: 1, overflow: 'auto', borderTop: `1px solid ${G.divider}`, background: G.surface, marginTop: 10 }}>
        {HISTORY.map(({ day, date, items, total }) => {
          const filtered = filter === 'All' ? items : items.filter(it => it.device === deviceKey[filter]);
          if (filtered.length === 0) return null;
          return (
            <React.Fragment key={day}>
              <div style={{ padding: '14px 16px 10px', background: G.appBg, display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', borderBottom: `1px solid ${G.divider}`, position: 'sticky', top: 0, zIndex: 1 }}>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
                  <div style={{ fontFamily: G.serif, fontSize: 18, color: G.ink1, letterSpacing: '-0.01em' }}>{day}</div>
                  {date && <Mono style={{ fontSize: 11, color: G.ink3 }}>{date}</Mono>}
                </div>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
                  <Label>SAVED</Label>
                  <div style={{ fontFamily: G.sans, fontSize: 15, fontWeight: 600, color: G.brandAction, letterSpacing: '-0.02em' }}>{total}</div>
                </div>
              </div>
              {filtered.map((it, i) => {
                const meta = DEVICE_META[it.device];
                return (
                  <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 12, padding: '13px 16px', borderBottom: `1px solid ${G.dividerSoft}`, background: G.surface }}>
                    <div style={{ width: 52, flex: 'none', paddingTop: 2 }}>
                      <Mono style={{ fontSize: 10.5, color: G.ink3, letterSpacing: 0.2, fontWeight: 500 }}>{it.time}</Mono>
                    </div>
                    <div style={{ width: 34, height: 34, borderRadius: 10, flex: 'none', background: G.surfaceSoft, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      <GIcon kind={meta.icon} size={19} color={G.ink2} />
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13.5, color: G.ink1, lineHeight: 1.4, fontWeight: 500 }}>{it.action}</div>
                      <div style={{ fontSize: 11, color: G.ink3, marginTop: 3, fontWeight: 500, letterSpacing: 0.03, textTransform: 'uppercase' }}>{meta.name}</div>
                    </div>
                    <div style={{ flex: 'none', alignSelf: 'flex-start', marginTop: 2 }}>
                      {it.save
                        ? <div style={{ padding: '4px 10px', borderRadius: 999, background: G.brandTint, color: G.brandDeep, fontFamily: G.sans, fontSize: 12, fontWeight: 600 }}>{it.impact}</div>
                        : <div style={{ padding: '4px 10px', borderRadius: 999, background: G.surfaceSoft, color: G.ink3, fontFamily: G.sans, fontSize: 11, fontWeight: 500 }}>{it.impact}</div>
                      }
                    </div>
                  </div>
                );
              })}
            </React.Fragment>
          );
        })}
        <div style={{ padding: '22px 16px 30px', textAlign: 'center', fontSize: 12, color: G.ink3 }}>Older actions are kept for 90 days.</div>
      </div>
      <TabBar active="history" onTab={onTab} />
    </div>
  );
}

// ─── Profile / Settings screen ────────────────────────────────────────────────

      <div style={{ position: 'absolute', top: 3, left: on ? 21 : 3, width: 20, height: 20, borderRadius: '50%', background: '#fff', boxShadow: '0 1px 3px rgba(0,0,0,0.25)', transition: 'left 0.2s' }} />
    </div>
  );
}

function SettingsRow({ label, value, sub, trailing, topBorder }) {
  return (
    <div style={{ padding: '13px 16px', borderTop: topBorder ? `1px solid ${G.dividerSoft}` : 'none', display: 'flex', alignItems: 'center', gap: 12 }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 14, fontWeight: 500, color: G.ink1, lineHeight: 1.3 }}>{label}</div>
        {sub && <div style={{ fontSize: 12, color: G.ink3, marginTop: 2 }}>{sub}</div>}
      </div>
      {value && <div style={{ fontSize: 13.5, color: G.ink3, fontWeight: 500, flex: 'none' }}>{value}</div>}
      {trailing}
      {!trailing && !value && <svg width="14" height="14" viewBox="0 0 14 14"><path d="M 5 2 L 10 7 L 5 12" fill="none" stroke={G.ink4} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></svg>}

  );
}

// ─── Interactive prototype ─────────────────────────────────────────────────────
function Prototype({ scenario, heroMode }) {
  const [screen, setScreen] = React.useState('home');
  const [chatStep, setChatStep] = React.useState('question');
  const [key, setKey] = React.useState(0);

  const goTo = (s, extra) => {
    setScreen(s);
    if (extra) setChatStep(extra);
    setKey(k => k + 1);
  };

  const goTab = id => {
    if (id === 'chat') { goTo('chat', 'question'); return; }
    goTo(id);
  };

  let content;
  if (screen === 'home') content = <HomeScreen scenario={scenario} heroMode={heroMode} onChatTap={() => goTo('chat', 'question')} onTab={goTab} />;
  else if (screen === 'chat') content = chatStep === 'confirmed'
    ? <ChatConfirmedScreen onBack={() => goTo('home')} onTab={goTab} />
    : <ChatScreen onBack={() => goTo('home')} onAction={() => { setChatStep('confirmed'); setKey(k=>k+1); }} onTab={goTab} />;
  else if (screen === 'history') content = <HistoryScreen onTab={goTab} />;
  else if (screen === 'profile') content = <ProfileScreen onTab={goTab} />;

  return <div key={key} className="screen-enter" style={{ height: '100%', width: '100%' }}>{content}</div>;
}

// ─── Root ─────────────────────────────────────────────────────────────────────
function App() {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', width: '100%' }}>
      <div className="phone-shell">
        <div className="phone-notch" />
        <div className="phone-screen">
          <Prototype scenario="pre-peak" heroMode="dollars" />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
